- name: Create artifact directories inside {{ data_dir }}
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "755"
    state: directory
  loop: "{{ artifact_directories }}"

- name: Download artifacts with curl retries
  become: true
  ansible.builtin.command:
    argv:
      - /bin/bash
      - "{{ role_path }}/files/download_artifact.sh"
      - "{{ item.url }}"
      - "{{ item.dest }}"
      - "{{ item.checksum }}"
      - "{{ item.mode | default('644') }}"
  register: artifact_download_result
  changed_when: artifact_download_result.rc == 10
  failed_when: artifact_download_result.rc not in [0, 10]
  loop: "{{ artifact_downloads }}"
  loop_control:
    label: "{{ item.dest | replace(data_dir ~ '/', '') }}"

- name: Extract downloaded artifact archives
  ansible.builtin.unarchive:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    remote_src: true
    extra_opts: "{{ item.extra_opts | default(omit) }}"
  loop: "{{ artifact_archives }}"
  loop_control:
    label: "{{ item.src | replace(data_dir ~ '/', '') }}"
