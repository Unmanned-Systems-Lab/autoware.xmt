# cspell:ignore Bcumm
- name: Check for Jetson device model file
  ansible.builtin.stat:
    path: /proc/device-tree/model
  register: spconv_device_model_path

- name: Read device model
  ansible.builtin.shell: tr -d '\0' < /proc/device-tree/model
  args:
    executable: /bin/bash
  register: spconv_device_model
  changed_when: false
  when: spconv_device_model_path.stat.exists

- name: Detect whether this arm64 machine is a Jetson
  ansible.builtin.set_fact:
    spconv_effective_is_jetson: "{{ spconv_is_jetson | bool or (ansible_architecture == 'aarch64' and (((spconv_device_model.stdout | default('')) is search('Jetson')) or (ansible_kernel is search('tegra')))) }}"

- name: Normalize dpkg architecture
  ansible.builtin.set_fact:
    spconv_normalized_arch: "{{ ansible_architecture | regex_replace('aarch64', 'arm64') | regex_replace('x86_64', 'amd64') }}"

- name: Set architecture suffix
  ansible.builtin.set_fact:
    spconv_arch_suffix: "{{ '-jetson' if (spconv_normalized_arch == 'arm64' and spconv_effective_is_jetson | bool) else ('-sbsa' if spconv_normalized_arch == 'arm64' else '') }}"

- name: Download the cumm package
  ansible.builtin.get_url:
    mode: "0644"
    url: https://github.com/autowarefoundation/spconv_cpp/releases/download/spconv_v{{ spconv_version }}%2Bcumm_v{{ cumm_version }}%2Bcu128/cumm_{{ cumm_version }}_{{ spconv_normalized_arch }}{{ spconv_arch_suffix }}.deb
    dest: /tmp/cumm.deb

- name: Install the cumm package
  become: true
  ansible.builtin.apt:
    deb: /tmp/cumm.deb
    state: present

- name: Download the spconv package
  ansible.builtin.get_url:
    mode: "0644"
    url: https://github.com/autowarefoundation/spconv_cpp/releases/download/spconv_v{{ spconv_version }}%2Bcumm_v{{ cumm_version }}%2Bcu128/spconv_{{ spconv_version }}_{{ spconv_normalized_arch }}{{ spconv_arch_suffix }}.deb
    dest: /tmp/spconv.deb

- name: Install the spconv package
  become: true
  ansible.builtin.apt:
    deb: /tmp/spconv.deb
    state: present
